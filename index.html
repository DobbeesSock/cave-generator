<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cave Generator</title>
<style>
    body {
        background: #111;
        color: #e8e2c8;
        font-family: serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }

    .card {
        border: 2px solid #e8e2c8;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        background: #1a1a1a;
        box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    h1 {
        margin-bottom: 10px;
        letter-spacing: 2px;
    }

    .number {
        font-size: 72px;
        margin: 20px 0;
    }

    button {
        padding: 10px 20px;
        font-size: 18px;
        background: #333;
        color: #e8e2c8;
        border: 1px solid #e8e2c8;
        cursor: pointer;
    }

    button:hover {
        background: #555;
    }

    #remaining {
    	margin-top: 10px;
    	font-size: 14px;
    	opacity: 0.8;
    }
</style>
</head>
<body>

<div class="card">
    <h1>CAVE DISCOVERY</h1>
    <div class="number" id="caveNumber">--</div>

    <button onclick="generateCave()">Discover Cave</button>

    <br><br>

    <div id="remaining">Remaining: 261</div>

    <br>

    <button onclick="resetCaves()">Reset</button>

    <br>

    <input id="manualInput" placeholder="Enter cave # (0–260)" style="padding:5px;">

    <button onclick="goToCave()">Go</button>

    <br><br>

<button onclick="exportSave()">Export Save</button>
<button onclick="importSave()">Import Save</button>
</div>

<script>
let availableCaves = [];
let lastCave = null;

// 🔹 Load data
function initializeCaves() {
    let savedPool = localStorage.getItem("cavePool");
    let savedLast = localStorage.getItem("lastCave");

    if (savedPool) {
        availableCaves = JSON.parse(savedPool);
    } else {
        // Create fresh pool WITHOUT calling reset
        availableCaves = [];
        for (let i = 0; i <= 260; i++) {
            availableCaves.push(i);
        }
        saveData();
    }

    if (savedLast) {
        lastCave = savedLast;
        document.getElementById("caveNumber").innerText = lastCave;
    }

    updateRemaining();
}
// 🔹 Save data
function saveData() {
    localStorage.setItem("cavePool", JSON.stringify(availableCaves));
    localStorage.setItem("lastCave", lastCave);
}

// 🔹 Update UI
function updateRemaining() {
    document.getElementById("remaining").innerText =
        "Remaining: " + availableCaves.length;
}

// 🎲 Generate random cave
function generateCave() {
    if (availableCaves.length === 0) {
        alert("All caves explored! Resetting...");
        resetCaves();
        return;
    }

    let index = Math.floor(Math.random() * availableCaves.length);
    let num = availableCaves.splice(index, 1)[0];

    setCave(num);
}

// 🔢 Manual input
function goToCave() {
    let input = document.getElementById("manualInput").value;
    document.getElementById("manualInput").value = "";

    if (input === "") return;

    let num = parseInt(input);

    if (isNaN(num) || num < 0 || num > 260) {
        alert("Enter a number between 00 and 260");
        return;
    }

    if (!availableCaves.includes(num)) {
        alert("This cave was already explored!");
        return;
    }

    let index = availableCaves.indexOf(num);
    if (index !== -1) {
        availableCaves.splice(index, 1);
    }

    setCave(num);
}
// 🔹 Set cave (shared logic)
function setCave(num) {
    let formatted = num.toString().padStart(2, '0');

    lastCave = formatted;
    document.getElementById("caveNumber").innerText = formatted;

    saveData();
    updateRemaining();
}

// 🔄 Reset
function resetCaves() {
    availableCaves = [];
    for (let i = 0; i <= 260; i++) {
        availableCaves.push(i);
    }

    lastCave = null;

    saveData();

    document.getElementById("caveNumber").innerText = "--";
    updateRemaining();
}

// 📤 Export Save
function exportSave() {
    let data = {
        pool: availableCaves,
        last: lastCave
    };

    let encoded = btoa(JSON.stringify(data));
    navigator.clipboard.writeText(encoded);
    alert("Save code copied to clipboard!");
}

// 📥 Import Save
function importSave() {
    let input = prompt("Paste your save code:");

    if (!input) return;

    try {
        let decoded = JSON.parse(atob(input));

        availableCaves = decoded.pool;
        lastCave = decoded.last;

        saveData();

        document.getElementById("caveNumber").innerText =
            lastCave ? lastCave : "--";

        updateRemaining();
    } catch {
        alert("Invalid save code");
    }
}

// 🔹 Init
initializeCaves();
</script>
</body>
</html>
